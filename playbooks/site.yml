---
- name: Complete Production Server Setup
  hosts: production
  become: yes
  vars:
    timezone: "UTC"
    backup_drive: "/mnt/backup_volume"
    nfs_export_path: "/srv/nfs_share"
    domain_name: "liliangaladima.online"
    grafana_admin_password: "lilian123"

  tasks:
    # ============================================
    # 1. SYSTEM HARDENING
    # ============================================
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install essential packages
      apt:
        name:
          - ufw
          - fail2ban
          - unattended-upgrades
          - nginx
          - nfs-kernel-server
          - docker.io
          - docker-compose-v2
          - python3-pip
          - htop
          - curl
          - wget
          - git
          - vim
          - net-tools  
        state: present

    - name: Configure SSH key-only authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: restart sshd

    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: restart sshd

    - name: Configure UFW defaults
      ufw:
        direction: "{{ item.direction }}"
        policy: "{{ item.policy }}"
      loop:
        - { direction: 'incoming', policy: 'deny' }
        - { direction: 'outgoing', policy: 'allow' }

    - name: Allow essential ports
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - '22'   # SSH
        - '80'   # HTTP
        - '443'  # HTTPS
        - '2049' # NFS
        - '111'  # NFS portmapper
        - '3000' # Grafana
        - '9090' # Prometheus

    - name: Allow Prometheus in Docker to access Node Exporter
      ufw:
        rule: allow
        port: '9100'
        proto: tcp
        src: '172.17.0.0/16'

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Configure fail2ban
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 5

          [sshd]
          enabled = true
          port = ssh
          logpath = %(sshd_log)s
          backend = systemd
      notify: restart fail2ban

    - name: Setup unattended-upgrades
      copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}";
              "${distro_id}:${distro_codename}-security";
              "${distro_id}ESMApps:${distro_codename}-apps-security";
              "${distro_id}ESM:${distro_codename}-infra-security";
          };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";

    - name: Enable automatic updates
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Download-Upgradeable-Packages "1";
          APT::Periodic::AutocleanInterval "7";
          APT::Periodic::Unattended-Upgrade "1";

    # ============================================
    # 2. STORAGE & BACKUP SETUP
    # ============================================
    - name: Create NFS share directory
      file:
        path: "{{ nfs_export_path }}"
        state: directory
        mode: '0777'

    - name: Configure NFS exports
      lineinfile:
        path: /etc/exports
        line: "{{ nfs_export_path }} *(rw,sync,no_subtree_check,no_root_squash)"
        create: yes
      notify: restart nfs

    - name: Create backup directory
      file:
        path: "{{ backup_drive }}"
        state: directory
        mode: '0755'

    - name: Deploy backup script
      copy:
        src: ../files/backup_script.sh
        dest: /usr/local/bin/backup.sh
        mode: '0755'

    - name: Setup daily backup cron
      cron:
        name: "daily backup"
        minute: "0"
        hour: "2"
        job: "/usr/local/bin/backup.sh >> /var/log/backup.log 2>&1"

    # ============================================
    # 3. NGINX WITH VIRTUAL HOSTS
    # ============================================
    - name: Create web root for virtual host
      file:
        path: /var/www/{{ domain_name }}/html
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Deploy sample index page
      copy:
        content: |
          <html>
          <head><title>Production Server</title></head>
          <body>
          <h1>Server is Operational</h1>
          <p>Managed by Ansible | Monitored with Prometheus & Grafana</p>
          </body>
          </html>
        dest: /var/www/{{ domain_name }}/html/index.html

    - name: Configure NGINX virtual host
      template:
        src: ../templates/nginx-vhost.conf.j2
        dest: /etc/nginx/sites-available/{{ domain_name }}
      notify: restart nginx

    - name: Enable virtual host
      file:
        src: /etc/nginx/sites-available/{{ domain_name }}
        dest: /etc/nginx/sites-enabled/{{ domain_name }}
        state: link
      notify: restart nginx

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: restart nginx

    # ============================================
    # 4. DOCKER OBSERVABILITY STACK
    # ============================================
    - name: Ensure docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ansible user to docker group
      user:
        name: ansible
        groups: docker
        append: yes

    - name: Create monitoring directory
      file:
        path: /opt/monitoring
        state: directory
        mode: '0755'

    - name: Deploy docker-compose configuration
      copy:
        src: ../files/docker-compose.yml
        dest: /opt/monitoring/docker-compose.yml

    - name: Deploy Prometheus configuration
      copy:
        src: ../files/prometheus.yml
        dest: /opt/monitoring/prometheus.yml

#    - name: Get internal IP address
#      set_fact:
#        internal_ip: "{{ ansible_default_ipv4.address }}"

#    - name: Allow Prometheus node target to use internal IP
#      replace:
#        path: /opt/monitoring/prometheus.yml
#        regexp: 'localhost:9100'
#        replace: "{{ internal_ip }}:9100"

#    - name: Deploy Grafana dashboards
#      copy:
#        src: ../files/dashboard-config.yaml
#        dest: /opt/monitoring/dashboard-config.yaml

#    - name: Start monitoring stack
#      docker_compose:
#        project_src: /opt/monitoring
#        state: present
#        restarted: yes

    - name: Install Node Exporter for system metrics
      shell: |
        wget https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz
        tar xvf node_exporter-1.7.0.linux-amd64.tar.gz
        sudo mv node_exporter-1.7.0.linux-amd64/node_exporter /usr/local/bin/
        rm -rf node_exporter-1.7.0.linux-amd64*
      args:
        creates: /usr/local/bin/node_exporter

    - name: Create node_exporter systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          Type=simple
          User=nobody
          Group=nogroup
          ExecStart=/usr/local/bin/node_exporter

          [Install]
          WantedBy=multi-user.target

    - name: Start node_exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
        daemon_reload: yes  


    - name: Start monitoring stack
      command: docker compose up -d
      args:
        chdir: /opt/monitoring
      environment:
        GRAFANA_PASSWORD: "{{ grafana_admin_password }}"

  handlers:
    - name: restart sshd
      service:
        name: sshd
        state: restarted

    - name: restart fail2ban
      service:
        name: fail2ban
        state: restarted

    - name: restart nginx
      service:
        name: nginx
        state: restarted

    - name: restart nfs
      service:
        name: nfs-server
        state: restarted
